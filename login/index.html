<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Box & Ladder</title>
  <meta name="description" content="Protected admin login for Box & Ladder." />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/index.html">Box & Ladder</a>
      <nav class="nav">
        <a href="/cybersecurity.html">CyberSecurity</a>
        <a href="/hacking.html">Hacking</a>
        <a href="/index.html#about">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container auth-shell">
        <section class="admin-panel auth-card">
          <div class="section-header">
            <p class="eyebrow">Protected Route</p>
            <h1>Admin Login</h1>
            <p>Sign in to reach the private publishing panel.</p>
          </div>

          <form id="login-form" class="admin-form" autocomplete="off">
            <label>
              <span>Password</span>
              <input type="password" name="password" placeholder="Admin password" required />
            </label>

            <div class="hero-actions">
              <button type="submit" class="btn">Sign in</button>
            </div>

            <p class="inline-note auth-error" id="login-status"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Box & Ladder | Security writeups</p>
      <p class="muted">Updated <span id="year"></span></p>
    </div>
  </footer>

  <script src="/assets/main.js"></script>
  <script src="/assets/login.js"></script>
</body>
</html>
