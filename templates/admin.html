<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Homepage Admin | Yoinked by Yoinkas</title>
  <meta name="description" content="Protected homepage editor for Yoinked by Yoinkas." />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body class="admin-page">
  <header class="admin-header">
    <div class="container">
      <div class="admin-header-copy">
        <p class="eyebrow">Protected Admin</p>
        <h1>Homepage Editor</h1>
        <p class="lede">Use the three-dot menus on each section, card, or image block to edit, hide, delete, or move it.</p>
      </div>
      <div class="hero-actions">
        <button type="button" class="btn" id="homepage-add-section">Add custom section</button>
        <button type="button" class="btn ghost" id="homepage-reset">Reset homepage</button>
        <a class="btn ghost" href="/index.html" target="_blank" rel="noreferrer">Open homepage</a>
        <button type="button" class="btn ghost nav-button" id="logout-button">Log out</button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="admin-toolbar">
          <p class="inline-note" id="homepage-status"></p>
          <button type="button" class="btn ghost" id="homepage-restore-sections">Restore hidden sections</button>
        </div>
        <div id="homepage-preview" class="admin-canvas"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Protected homepage admin</p>
      <p class="muted">Updated <span id="year"></span></p>
    </div>
  </footer>

  <script src="/assets/content.js"></script>
  <script src="/assets/main.js"></script>
  <script src="/assets/admin-inline.js"></script>
</body>
</html>
